apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: regional-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ${git_repo}
    targetRevision: HEAD
    path: ${app_path}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
